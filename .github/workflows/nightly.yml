name: Nightly Security Scan

on:
  schedule:
    # Run every night at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  packages: read

# Allow only one concurrent deployment, skipping runs queued between the run
# in-progress and latest queued. However, do NOT cancel in-progress runs as we
# want to allow these deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  scan:
    name: Grype Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install grype
        run: curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Resolve latest untagged nightly digest
        id: nightly_digest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          package="dangerzone"
          owner="freedomofpress"
          digest=$(gh api -H "Accept: application/vnd.github+json" "/orgs/${owner}/packages/container/${package}/versions?per_page=100" \
            --jq '[.[] | select((.metadata.container.tags | length) == 0)] | sort_by(.updated_at) | last | .metadata.container.digest')
          if [ -z "$digest" ] || [ "$digest" = "null" ]; then
            echo "No untagged digest found for ${owner}/${package}." >&2
            exit 1
          fi
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Run grype scan and generate HTML reports
        run: |
          grype ghcr.io/freedomofpress/dangerzone/v1:latest \
            --config .grype.yaml \
            --output template \
            --template templates/html.tmpl \
            --file report.html

          grype ghcr.io/freedomofpress/dangerzone@${{ steps.nightly_digest.outputs.digest }} \
            --config .grype.yaml \
            --output template \
            --template templates/html.tmpl \
            --file nightly.html

      - name: Upload HTML report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: |
            report.html
            nightly.html

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: scan
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download HTML report artifact
        uses: actions/download-artifact@v4
        with:
          name: security-report

      - name: Rename report to index.html
        run: mv report.html index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
