name: Nightly Security Scan

on:
  schedule:
    # Run every night at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run
# in-progress and latest queued. However, do NOT cancel in-progress runs as we
# want to allow these deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  scan:
    name: Grype Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install grype
        run: curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Run grype scan and generate HTML report
        run: |
          grype ghcr.io/freedomofpress/dangerzone/v1:latest \
            --config .grype.yaml \
            --output template \
            --template templates/html.tmpl \
            --file report.html

      - name: Upload HTML report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: report.html

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: scan
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download HTML report artifact
        uses: actions/download-artifact@v4
        with:
          name: security-report

      - name: Rename report to index.html
        run: mv report.html index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
